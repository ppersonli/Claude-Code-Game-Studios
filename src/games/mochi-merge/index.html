<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Mochi Merge - 麻糬合合樂</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FFF0F5; overflow: hidden; -webkit-user-select: none; user-select: none; }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- CrazyGames SDK v3 only — Poki removed for CG sandbox compat -->
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>

  <!-- Scroll / keyboard prevention for iframe embed -->
  <script>
    window.addEventListener("wheel", (e) => e.preventDefault(), { passive: false });
    window.addEventListener("keydown", (e) => {
      if (["ArrowUp", "ArrowDown", " "].includes(e.key)) e.preventDefault();
    });
  </script>

  <script type="module" src="./main.ts"></script>
</body>
</html>
