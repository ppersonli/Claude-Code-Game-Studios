<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Bounce Golf</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      background: #1a1a2e;
      font-family: 'Nunito', sans-serif;
      touch-action: none;
    }
    #app { width: 100vw; height: 100vh; touch-action: none; }
    canvas { touch-action: none; }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- CrazyGames SDK v3 -->
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>

  <!-- Scroll / keyboard prevention for iframe embed -->
  <script>
    window.addEventListener("wheel", (e) => e.preventDefault(), { passive: false });
    window.addEventListener("keydown", (e) => {
      if (["ArrowUp", "ArrowDown", " "].includes(e.key)) e.preventDefault();
    });
  </script>

  <script type="module" src="./main.ts"></script>
</body>
</html>
